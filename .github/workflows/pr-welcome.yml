name: Welcome sample-site pull requests

# SECURITY: pull_request_target can comment on pull requests from forks, but this
# workflow must never check out, build, or otherwise execute pull-request content.
# It only explains the flow: private automation replays eligible file changes for
# review, and only the private aardvark publisher may update public main.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: none
  issues: write

jobs:
  welcome:
    if: github.repository == 'aardvarkdocs/sample-site'
    runs-on: ubuntu-latest
    steps:
      - name: Explain the upstream review flow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const marker = '<!-- sample-site-sync-welcome -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            if (comments.some((comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.startsWith(marker)
            )) {
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                marker,
                '',
                `Thanks @${pr.user.login}!`,
                '',
                'For a new eligible change, the bot normally validates and replays the file changes into a draft pull request in the private aardvark source repository. Keep this public pull request open. While an ordinary mirror remains a draft and maintainers have not frozen a conflict resolution, follow-up commits refresh it automatically.',
                '',
                'Once maintainers mark the mirror ready for final review, freeze a conflict resolution, or the status says the accepted revision is waiting to be published, open a new public pull request for further changes. Later commits are not part of the reviewed mirror.',
                '',
                'Maintainers review the complete private diff, run isolated CI, resolve any replay conflict there, and merge only the private mirror pull request. You do not need to rebase merely to solve a private-source conflict; isolated CI may wait for the resolved revision.',
                '',
                'This public pull request is never merged into public `main`; that branch accepts only bot-authored outbound sync commits from the aardvark repository. After the next append-only publish contains the accepted private revision, the bot verifies it, comments here, and closes this still-unmerged pull request.',
              ].join('\n'),
            });
